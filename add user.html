            border-color: var(--success-color) !important;

        }

        .form-label {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 15px;
        }

        .form-container {

            border-radius: 8px;

        }

        .error-text {
            color: var(--error-color);

            margin-top: 4px;
            margin-bottom: 8px;
            display: block;
            min-height: 16px;
        }

        .success-text {
            color: var(--success-color);
            font-weight: 500;
            font-size: 12.5px;
            margin-top: 4px;
            margin-bottom: 8px;

            min-height: 16px;
        }

        .rules-container small {
            display: block;
            font-size: 12.5px;
            margin-top: 4px;
            margin-bottom: 8px;
            min-height: 16px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .strong-message {
            display: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--success-color);
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .strong-message.show {
            display: block;
        }

        .hide {
            display: none !important;
        }

        .btn {
            padding: 11px 24px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {

        }

        .btn-submit {
            background-color: var(--secondary-color);
            color: var(--light-bg);
        }

        .btn-submit:hover {

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <h2 class="text-center mb-4">Add User</h2>
            
            <form action="/submit_user" method="post" enctype="multipart/form-data" class="form-container p-4">
                
                <div class="mb-3">
                    <label for="Name" class="form-label">Name:</label>
                    <input type="text" class="form-control" id="Name" name="Name" placeholder="Enter your name">
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com">
                    <small class="d-block"></small>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password">
                    <div class="rules-container"></div>
                    <small class="strong-message">✓ Password is strong</small>
                </div>
                
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password:</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm password">
                    <small class="d-block"></small>
                </div>
                
                <div class="mb-3">
                    <label for="extension" class="form-label">User Name:</label>
                    <input type="text" class="form-control" id="extension" name="extension" placeholder="Enter username">
                </div>
                
                <div class="mb-4">
                    <label for="profile_picture" class="form-label">Profile Picture:</label>
                    <input type="file" class="form-control" id="profile_picture" name="profile_picture" accept="image/*">
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-submit flex-grow-1">Save</button>
                    <button type="reset" class="btn btn-reset flex-grow-1">Reset</button>
                </div>
            </form>
        </div>
